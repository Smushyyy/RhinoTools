<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #2d2d2d; color: #d8d8d8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px; margin: 0; padding: 0;
    }
    .wrap { padding: 8px 10px 12px; }

    label {
      display: block; margin: 10px 0 3px;
      font-weight: 600; color: #888;
      text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em;
    }

    select {
      width: 100%; background: #1a1a1a; color: #e0e0e0;
      border: 1px solid #444; border-radius: 4px; padding: 6px 8px;
      font-size: 12px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #6c8ebf; }
    select[size] { height: 138px; }

    .search-row { position: relative; }
    .search-row input {
      width: 100%; background: #1a1a1a; color: #e0e0e0;
      border: 1px solid #444; border-radius: 4px;
      padding: 6px 26px 6px 8px; font-size: 12px;
    }
    .search-row input:focus { outline: none; border-color: #6c8ebf; }
    .search-row input::placeholder { color: #555; }
    .clear {
      position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 15px; padding: 0; line-height: 1;
    }
    .clear:hover { color: #aaa; }

    .meta { display: flex; justify-content: space-between; margin-top: 2px; }
    .meta span { font-size: 10px; color: #555; }

    .preview {
      margin-top: 10px; background: #161616;
      border: 1px solid #333; border-radius: 4px;
      padding: 7px 10px;
    }
    .preview-title { font-size: 10px; color: #555; margin-bottom: 3px; }
    .preview-cmd { font-family: monospace; font-size: 11px; color: #7ec8e3; word-break: break-all; }
  </style>
</head>
<body>
<div class="wrap">

  <label for="cat">Category</label>
  <select id="cat"></select>

  <label>Search</label>
  <div class="search-row">
    <input id="search" type="text" placeholder="e.g. boolean, loft, zoom…">
    <button class="clear" id="clear" title="Clear">×</button>
  </div>

  <label for="tools">Tool</label>
  <select id="tools" size="8"></select>
  <div class="meta">
    <span id="count"></span>
    <span id="cat-hint"></span>
  </div>

  <div class="preview">
    <div class="preview-title">Rhino command</div>
    <div class="preview-cmd" id="cmd">—</div>
  </div>

</div>

  ]},

  ]},

const ALL = CATALOGUE.flatMap(c => c.tools.map(t => ({ ...t, category: c.label })));

// DOM
const catEl    = document.getElementById("cat");
const toolsEl  = document.getElementById("tools");
const searchEl = document.getElementById("search");
const clearEl  = document.getElementById("clear");
const cmdEl    = document.getElementById("cmd");
const countEl  = document.getElementById("count");
const hintEl   = document.getElementById("cat-hint");

// Current saved state
let saved = { category: "", command: "", label: "" };

// Stream Deck WebSocket connection
let websocket = null;
let uuid      = null;

// Called by Stream Deck when the PI loads
function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
  uuid = inUUID;

  // Pre-populate from actionInfo settings (may be available immediately)
  try {
    const ai = JSON.parse(inActionInfo);
    if (ai?.payload?.settings) applySettings(ai.payload.settings);
  } catch { /* ignore */ }

  websocket = new WebSocket("ws://127.0.0.1:" + inPort);

  websocket.onopen = () => {
    // Register this property inspector with Stream Deck
    websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    // Ask for the current settings
    websocket.send(JSON.stringify({ event: "getSettings", context: inUUID }));
  };

  websocket.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    if (msg.event === "didReceiveSettings") {
      applySettings(msg.payload?.settings ?? {});
    }
  };
}

// Apply received settings to the UI (without triggering a save)
function applySettings(s) {
  saved = {
    category: s.category ?? "",
    command:  s.command  ?? "",
    label:    s.label    ?? "",
  };

  // Set category dropdown
  if (saved.category) catEl.value = saved.category;
  if (!catEl.value)   catEl.value = CATALOGUE[0].label;

  // Clear search so we see the right category
  searchEl.value = "";

  showCat(catEl.value);
  restoreSelection();
}

// ---------- Build category dropdown ----------
CATALOGUE.forEach(c => catEl.appendChild(new Option(c.label, c.label)));

// ---------- Populate tool list ----------
function populate(tools) {
  toolsEl.innerHTML = "";
  tools.forEach(t => {
    const o = new Option(t.label, t.command);
    o.dataset.label = t.label;
    o.dataset.cat   = t.category || catEl.value;
    toolsEl.appendChild(o);
  });
  countEl.textContent = `${tools.length} tool${tools.length !== 1 ? "s" : ""}`;
}

function showCat(catLabel) {
  const c = CATALOGUE.find(x => x.label === catLabel);
  populate(c ? c.tools.map(t => ({ ...t, category: catLabel })) : []);
  hintEl.textContent = "";
}

function showSearch(q) {
  const lq = q.toLowerCase();
  const matches = ALL.filter(t =>
    t.label.toLowerCase().includes(lq) ||
    t.command.toLowerCase().includes(lq) ||
    t.category.toLowerCase().includes(lq)
  );
  populate(matches);
  hintEl.textContent = matches.length
    ? `across ${new Set(matches.map(m => m.category)).size} categories`
    : "";
}

// Select the saved command in the list; fall back to first item
function restoreSelection() {
  for (const o of toolsEl.options) {
    if (o.value === saved.command) {
      o.selected = true;
      updatePreview(o);
      return;
    }
  }
  if (toolsEl.options.length) {
    toolsEl.options[0].selected = true;
    updatePreview(toolsEl.options[0]);
  }
}

function updatePreview(opt) {
  cmdEl.textContent = opt ? (opt.value || "—") : "—";
}

// Save settings to Stream Deck and update preview
function saveCurrentSelection() {
  const opt = toolsEl.options[toolsEl.selectedIndex];
  if (!opt) return;
  saved = {
    category: opt.dataset.cat || catEl.value,
    command:  opt.value,
    label:    opt.dataset.label || opt.text,
  };
  updatePreview(opt);
  if (websocket && websocket.readyState === WebSocket.OPEN) {
    websocket.send(JSON.stringify({
      event:   "setSettings",
      context: uuid,
      payload: saved,
    }));
  }
}

// ---------- Events ----------
catEl.addEventListener("change", () => {
  searchEl.value = "";
  // Don't restore old selection when user explicitly switches category —
  // just pick the first tool in the new category.
  saved.command = "";
  showCat(catEl.value);
  restoreSelection();
  saveCurrentSelection();
});

toolsEl.addEventListener("change", saveCurrentSelection);

searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim();
  if (!q) showCat(catEl.value);
  else    showSearch(q);
  restoreSelection();
});

clearEl.addEventListener("click", () => {
  searchEl.value = "";
  showCat(catEl.value);
  restoreSelection();
});

// ---------- Initial render (before SD connects) ----------
catEl.value = CATALOGUE[0].label;
showCat(CATALOGUE[0].label);
</script>
